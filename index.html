        async function extractTextFromFile(file) {
            if (file.type === "text/plain") {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsText(file);
                });
            } else if (file.type === "application/pdf") {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let fullText = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(" ");
                                fullText += pageText + "\n";
                            }
                            resolve(fullText);
                        } catch (err) { reject(err); }
                    };
                    reader.onerror = (e) => reject(e);
                    reader.readAsArrayBuffer(file);
                });
            }
            return "";
        }

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return await res.json();
                    const errData = await res.json().catch(() => ({}));
                    const errMsg = errData.error?.message || `HTTP 狀態碼: ${res.status}`;
                    if (res.status === 429 || res.status >= 500) {
                        if (i === maxRetries - 1) throw new Error(errMsg);
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    } else { throw new Error(errMsg); }
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    if (e.name === 'TypeError') { await new Promise(r => setTimeout(r, delay)); delay *= 2; } 
                    else { throw e; }
                }
            }
        }

                    strategyInstruction = `🚨 SALES INTENT MODE: Naturally weave ONE commercial word (價格, 報價, or 供應商) into the Title. \nFORMAT EXAMPLE: "ARK-11-S1A5 價格與供應商：無風扇邊緣運算機 | ${brandName}". \nENSURE NATIVE CHINESE GRAMMAR. DO NOT just prepend the word abruptly.`;
                } else if (strategy === "brand_first") {
                    strategyInstruction = `🚨 AUTHORITY MODE: Naturally weave ONE trust word (原廠直營 or 現貨供應). \nFORMAT EXAMPLE: "${brandName} ARK-11-S1A5 原廠直營：強固型無風扇工控機". \nENSURE NATIVE CHINESE GRAMMAR. MUST start strictly with ${brandName}.`;
                } else {
                    strategyInstruction = `🚨 USP MODE: Focus strictly on Technical USP. \nFORMAT EXAMPLE: "ARK-11-S1A5 Intel N3350 極致精巧無風扇工控機 | ${brandName}".`;
                }

                let engineInstruction = "";
                if (geo === "Gemini") {
                    engineInstruction = "**ENGINE TARGET (Gemini)**: Optimize for Google AI Overviews (SGE). You MUST use a highly structured, definitional, and factual tone to maximize top-snippet citations.";
                } else if (geo === "ChatGPT") {
                    engineInstruction = "**ENGINE TARGET (ChatGPT)**: Focus heavily on 'Solutions' and 'Pain Points'. Lower hardware parameter density. Use a consultative, reasoning-friendly tone.";
                } else if (geo === "Perplexity") {
                    engineInstruction = "**ENGINE TARGET (Perplexity)**: Maximize Data Density. You MUST aggressively highlight exact numerical values, IP ratings, and military-grade certification codes in the description.";
                } else {
                    engineInstruction = "**ENGINE TARGET (Standard SEO)**: Maximize CTR. You MUST inject CTA Power Words (e.g., '立即聯繫專家評估', '索取專屬報價') at the END of the Meta Description.";
                }

                systemPrompt = `You are a professional IPC marketing expert.
                **OUTPUT LANGUAGE**: MUST be **${targetLangLabel}**.
                ${pageLevelInstruction}

                **TITLE STRUCTURE**:
                ${strategyInstruction}
                🚨 MANDATORY: Title must be under 60 Bytes (30 Chinese chars).
                
                **CHARACTER LIMITS**:
                - **TITLE**: UNDER 30 Trad. Chinese characters (Max 60 Bytes).
                - **DESCRIPTION**: UNDER 80 Trad. Chinese characters (Max 160 Bytes). Aim for 70-75.
                
                ${engineInstruction}
                
                **ADVANCED GEO STRATEGIES**:
                - **[FAQ]**: Exactly 3 Q&A pairs with SEMANTIC CONTRAST. NO basic spec questions. MUST ask reasoning questions (e.g., comparing architectures, or solving extreme environment pain points).
                ${featureInstruction}
                - **[TAGS]**: 3-6 specific entity keywords (Specs, Features, Scenarios).
                - **[CATEGORY]**: 1-2 broad product classification (e.g., Industrial IoT Gateway).
                
                🚨 **CRITICAL ANTI-HALLUCINATION (VERIFIED FACTS ONLY)** 🚨
                - Reject specs from different models in snippets.
                - VERIFIED FOCUS: If a specific hardware spec (like CPU or RAM) is NOT explicitly found in the provided sources, DO NOT guess from memory. Omit it and construct your Title, Description, and FAQ using ONLY confirmed features.
                
                **MANDATORY FORMAT**:
                ### [URL_START] {Target}
                [MODEL]
                {Extracted Model, Category, or Brand Name based on Page Level}
                [TITLE]
                {Optimized Title}
                [DESCRIPTION]
                {Description}
                [TAGS]
                {Tag1}, {Tag2}
                [CATEGORY]
                {Category}
                [GEO FEATURES]
                {Features or N/A}
                [FAQ]
                Q1: {Question}
                A1: {Answer}
                ...
                `;
            }

            if (extractedFileText) systemPrompt += `\n\n🚨 [SOURCE DOCUMENT (ABSOLUTE TRUTH)] 🚨\n${extractedFileText.substring(0, 30000)}\n**OVERRIDE ALL OTHER INFO.**`;

            try {
                const payload = {
                    contents: [{ parts: [{ text: `Target URL: ${targetUrls}\nPage Level: ${level}\nKnowledge: ${kbUrls}\nRules: ${kbManual}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    tools: [{ "google_search": {} }]
                };
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
                const responseData = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const outputText = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!outputText) throw new Error("回傳資料為空");
                renderCards(outputText, currentEngineMode);
            } catch (e) {
                outputContainer.innerHTML = `<div class="p-8 border border-red-200 bg-red-50 rounded-xl max-w-2xl mx-auto"><h4 class="font-bold text-red-800 mb-2">生成失敗</h4><p class="text-sm text-red-600 font-mono break-all">${e.message}</p></div>`;

        const parseList = (contentBlock) => {
            if (!contentBlock || contentBlock === "N/A") return [];
            return contentBlock.split('\n').map(s => s.replace(/^[-*•\d.]+\s*/, '').trim()).filter(s => s && !s.match(/^\[.*\]/));
        };

        const renderAdsItems = (items, maxBytes) => {
            return items.map((item) => {
                const bLen = getByteLen(item);
                const isOver = bLen > maxBytes;
                return `<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 p-3 ${isOver ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200'} border rounded-lg hover:border-blue-300 transition-colors"><div class="flex-grow font-medium ${isOver ? 'text-red-700' : 'text-slate-700'} text-sm leading-relaxed">${item}</div><div class="flex items-center gap-3"><span class="text-xs font-semibold ${isOver ? 'text-red-600 bg-red-100' : 'text-slate-500 bg-slate-100'} px-2.5 py-1 rounded-md">${bLen} / ${maxBytes}</span><button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(item)}" class="text-slate-400 hover:text-blue-600 transition-colors p-1.5"><i class="far fa-copy text-lg"></i></button></div></div>`;

        };

        function renderCards(text, mode) {

                    card.innerHTML = `<div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row justify-between sm:items-center gap-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold"><i class="fab fa-google"></i></div><div><h4 class="font-bold text-slate-800 text-sm">${detox(model)}</h4><p class="text-xs text-slate-500 truncate max-w-md">${url}</p></div></div></div><div class="p-6 space-y-8"><div><div class="flex justify-between items-center mb-2"><h5 class="text-xs font-bold text-slate-500 uppercase">廣告關鍵字 (BOF 長尾結合)</h5><button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(keywords)}" class="text-xs text-blue-600 font-semibold">複製</button></div><div class="text-sm text-slate-700 p-4 bg-slate-50 border border-slate-100 rounded-lg whitespace-pre-wrap">${keywords}</div></div><div><h5 class="text-xs font-bold text-slate-500 uppercase mb-3">廣告標題 (規格 + 數值鎖定)</h5><div class="space-y-2">${renderAdsItems(headlines, 30)}</div></div><div><h5 class="text-xs font-bold text-slate-500 uppercase mb-3">長標題與描述</h5><div class="space-y-2">${renderAdsItems(longHeadlines, 90)}${renderAdsItems(descriptions, 90)}</div></div></div>`;
                } else {

                        specHtmlBlock = `

                                    <div class="flex items-center gap-2"><i class="fas fa-list-ul text-slate-400"></i><span class="text-sm font-bold text-slate-700 uppercase">SPEC</span></div>

                    }
                    
                    lastResultsData.push({ "Model": detox(model), "URL": url, "Title": titleClean, "Desc": descClean, "FAQ": faqClean });
                    
                    card.innerHTML = `

                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(titleClean)}" class="absolute top-3 right-3 text-slate-400 opacity-0 group-hover:opacity-100"><i class="far fa-copy"></i></button>
                                </div>

                            <div class="relative group">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase">Meta Description (CTA 注入)</span>

                                </div>

                            ${specHtmlBlock}
                            
                            <div class="border-t border-slate-50 pt-12 relative group">
                                <div class="flex justify-between items-center mb-5">
                                    <span class="text-[11px] font-black text-blue-500 uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 shadow-sm">Expert FAQ (語義對比推理)</span>
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(faqClean)}" class="text-[11px] text-blue-400 font-bold underline decoration-2 underline-offset-8 opacity-0 group-hover:opacity-100 transition-opacity">${t.copySingle}</button>
                                </div>
                                <div class="text-base sm:text-lg whitespace-pre-wrap leading-relaxed text-slate-700 font-medium bg-slate-50 p-5 rounded-lg border border-slate-200">${faqClean}</div>

                        <div class="bg-slate-50 border-t border-slate-200 px-6 py-5 flex flex-col md:flex-row justify-between items-center gap-4">

            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><div class="flex justify-between items-end mb-2"><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider" data-i18n="kbUrlLabel">關聯知識網址</label><span class="text-[10px] font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded">URLs: <span id="url-count">0</span></span></div><textarea id="kb-urls" data-i18n="kbUrlPlaceholder" onblur="window.autoBrainSync()" class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 input-focus custom-scrollbar resize-none" placeholder="輸入相關技術白皮書網址..."></textarea></div>
                <div><div class="flex justify-between items-end mb-2"><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider" data-i18n="kbManualLabel">禁止規範</label><span class="text-[10px] font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded">Chars: <span id="char-count">0</span></span></div><textarea id="kb-manual" data-i18n="kbManualPlaceholder" onblur="window.autoBrainSync()" class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 input-focus custom-scrollbar resize-none" placeholder="例如禁語規範..."></textarea></div>
            </div>
        </section>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex flex-col sm:flex-row w-full md:w-auto gap-4">
                <div class="w-full sm:w-56"><label class="block text-xs font-semibold text-slate-500 uppercase mb-2" data-i18n="geoLabel">目標優化引擎</label><select id="pref-geo" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 focus:border-[#005bac] outline-none cursor-pointer shadow-sm"><option value="標準SEO優化">標準SEO優化</option><option value="Gemini">Gemini</option><option value="ChatGPT">ChatGPT</option><option value="Perplexity">Perplexity</option><option value="Google Ads (RSA 廣告素材)">Google Ads (RSA 廣告素材)</option></select></div>
                <div class="w-full sm:w-64"><label class="block text-xs font-semibold text-slate-500 uppercase mb-2" data-i18n="titleStrategyLabel">標題生成策略</label><select id="title-strategy" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 focus:border-[#005bac] outline-none cursor-pointer shadow-sm"><option value="smart_auto">智慧動態平衡</option><option value="keyword_first">搜尋意圖優先</option><option value="brand_first">品牌聲量優先</option></select></div>
            </div>
            <button id="submit-btn" onclick="window.executeOptimization()" class="w-full md:w-auto bg-[#005bac] hover:bg-[#004a8d] text-white px-8 py-3.5 rounded-lg font-bold text-sm shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-3"><i class="fas fa-magic"></i><span id="submit-btn-text" data-i18n="btnSubmit">執行 AI 內容生成</span></button>
        </div>
        <section id="result-area" class="hidden mt-12 scroll-mt-24">
            <div class="flex flex-col sm:flex-row justify-between items-end mb-6 gap-4">
                <div><h3 class="text-2xl font-bold text-slate-800" data-i18n="resTitle">優化產出結果</h3><div class="h-1 w-16 bg-[#005bac] rounded-full mt-3"></div></div>
                <div id="export-btn-container" class="hidden animate-in fade-in zoom-in duration-300"><button onclick="window.exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm px-6 py-2.5 rounded-lg flex items-center gap-2 shadow-sm"><i class="fas fa-file-excel"></i><span id="export-btn-text" data-i18n="btnExport">匯出 Excel 報告</span></button></div>
            </div>
            <div id="output-container" class="space-y-8"></div>
        </section>
    </main>

    <!-- API Key Modal -->
    <div id="api-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center transition-opacity opacity-0">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="api-modal-content">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-shield-alt text-[#005bac]"></i> <span data-i18n="modalApiTitle">API 金鑰安全設定</span></h3>
                <button onclick="window.toggleApiModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1"><i class="fas fa-times text-lg"></i></button>
            </div>
            <p id="api-modal-desc" class="text-xs text-slate-500 mb-6 font-medium leading-relaxed" data-i18n="modalApiDesc">金鑰將加密儲存於本地。</p>
            <div class="space-y-4">
                <input type="password" id="api-key-input" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono text-slate-700 focus:border-[#005bac] focus:bg-white outline-none transition-colors">
                <button onclick="window.saveApiKey()" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3.5 rounded-lg shadow-sm transition-all active:scale-95 flex justify-center items-center gap-2"><i class="fas fa-save"></i> <span data-i18n="modalApiSave">儲存並啟用金鑰</span></button>
            </div>
            <div class="mt-4 text-center h-4">
                <span id="api-save-status" class="text-xs font-bold text-emerald-500 opacity-0 transition-opacity flex items-center justify-center gap-1"><i class="fas fa-check-circle"></i> <span data-i18n="modalApiSuccess">金鑰已成功儲存！</span></span>
            </div>
        </div>
    </div>
</body>
</html>
