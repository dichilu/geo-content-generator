        function detox(text) {
            if(!text) return "";
            return text.replace(/\(\d+\s*characters?\)/gi, "").replace(/\(\d+\s*字\)/gi, "").replace(/Geo|SEO|SGE/gi, "").replace(/[\*#_`]/g, "").replace(/^[:：\s]+/, "").trim();

        function getByteLen(str) {
            let len = 0;
            for (let i = 0; i < str.length; i++) {
                if (str.charCodeAt(i) > 255) len += 2; else len += 1;

            return len;

        async function extractTextFromFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();

            if (file.type === "text/plain" || ext === 'txt' || ext === 'csv') {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(new Error("文字檔讀取失敗"));
                    reader.readAsText(file);
                });
            } else if (file.type === "application/pdf" || ext === 'pdf') {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let fullText = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(" ");
                                fullText += pageText + "\n";
                            }
                            resolve(fullText);
                        } catch (err) { reject(new Error("PDF 解析失敗，檔案可能已損壞或受密碼保護")); }
                    };
                    reader.onerror = (e) => reject(e);
                    reader.readAsArrayBuffer(file);
                });
            } else if (ext === 'docx') {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const arrayBuffer = e.target.result;
                            const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                            resolve(result.value);
                        } catch (err) { reject(new Error("Word 檔解析失敗")); }
                    };
                    reader.onerror = (e) => reject(e);
                    reader.readAsArrayBuffer(file);
                });
            } else if (ext === 'xlsx' || ext === 'xls') {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, {type: 'array'});
                            let fullText = "";
                            workbook.SheetNames.forEach(sheetName => {
                                const sheet = workbook.Sheets[sheetName];
                                const csv = XLSX.utils.sheet_to_csv(sheet);
                                fullText += `\n--- Excel 表籤: ${sheetName} ---\n${csv}`;
                            });
                            resolve(fullText);
                        } catch (err) { reject(new Error("Excel 檔解析失敗")); }
                    };
                    reader.onerror = (e) => reject(e);
                    reader.readAsArrayBuffer(file);
                });
            } else if (ext === 'ppt' || ext === 'pptx' || ext === 'doc') {

                    const res = await fetch(url, options);
                    if (res.ok) return await res.json();
                    const errData = await res.json().catch(() => ({}));
                    const errMsg = errData.error?.message || `HTTP 狀態碼: ${res.status}`;
                    if (res.status === 429 || res.status >= 500) {
                        if (i === maxRetries - 1) throw new Error(errMsg);
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    } else { throw new Error(errMsg); }
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    if (e.name === 'TypeError') { await new Promise(r => setTimeout(r, delay)); delay *= 2; } 
                    else { throw e; }
                }
            }

                                    <span class="text-[11px] font-black text-emerald-600 uppercase tracking-widest bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100 shadow-sm"><i class="fas fa-key mr-2"></i>廣告關鍵字矩陣 (20組)</span>
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(detox(keywords))}" class="text-xs font-bold text-emerald-600 hover:text-emerald-800 transition-colors flex items-center gap-2 bg-white px-4 py-2 rounded-lg border border-emerald-200 shadow-sm"><i class="far fa-copy"></i> 複製</button>
                                </div>
                                <div class="text-sm leading-relaxed text-slate-600 font-medium p-5 bg-slate-50 rounded-xl border border-slate-100 shadow-inner">${detox(keywords)}</div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[11px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 shadow-sm"><i class="fas fa-heading mr-2"></i>短標題 (上限 30 Bytes)</span>
                                </div>
                                <div class="space-y-3">${renderAdsItems(headlines, 30)}</div>
                            </div>
                            
                            <div class="border-t border-slate-100 pt-8">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[11px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-4 py-2 rounded-lg border border-indigo-100 shadow-sm"><i class="fas fa-align-left mr-2"></i>長標題 (上限 90 Bytes)</span>
                                </div>
                                <div class="space-y-3">${renderAdsItems(longHeadlines, 90)}</div>
                            </div>
                            
                            <div class="border-t border-slate-100 pt-8">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[11px] font-black text-purple-600 uppercase tracking-widest bg-purple-50 px-4 py-2 rounded-lg border border-purple-100 shadow-sm"><i class="fas fa-list-alt mr-2"></i>廣告描述 (上限 90 Bytes)</span>
                                </div>
                                <div class="space-y-3">${renderAdsItems(descriptions, 90)}</div>
                            </div>
                        </div>
                    `;
                } else {
                    const titleClean = detox(extract("TITLE"));
                    const descClean = detox(extract("DESCRIPTION"));
                    const featuresClean = detox(extract("GEO FEATURES"));
                    const faqClean = detox(extract("FAQ"));
                    const tags = extract("TAGS");
                    const cat = extract("CATEGORY");
                    const titleByteLen = getByteLen(titleClean);
                    const descByteLen = getByteLen(descClean);
                    const featuresListArray = parseList(featuresClean);
                    
                    let specHtmlBlock = "";
                    let featuresTextToCopy = "";
                    if (featuresClean && featuresClean.toUpperCase() !== "N/A" && featuresListArray.length > 0) {
                        const featuresHtml = `<ul class="space-y-3">` + featuresListArray.map(item => `<li class="flex items-start gap-3"><i class="fas fa-check-circle text-purple-500 mt-1"></i><span class="text-sm text-slate-700 font-medium leading-relaxed">${item}</span></li>`).join('') + `</ul>`;
                        featuresTextToCopy = featuresListArray.map(item => `- ${item}`).join('\n');
                        
                        specHtmlBlock = `
                            <div class="relative group border-t border-slate-100 pt-8">
                                <div class="flex justify-between items-end mb-3">
                                    <span class="text-[11px] font-black text-purple-600 uppercase tracking-widest bg-purple-50 px-4 py-2 rounded-lg border border-purple-100 shadow-sm">${isZh ? 'FEATURES (重點特徵)' : 'FEATURES'}</span>
                                </div>
                                <div class="p-6 bg-slate-50 border border-slate-200 rounded-xl relative shadow-inner group-hover:border-purple-300 transition-colors">
                                    ${featuresHtml}
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(featuresTextToCopy)}" class="absolute top-4 right-4 text-slate-400 hover:text-purple-600 opacity-0 group-hover:opacity-100 transition-all bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm"><i class="far fa-copy text-base"></i></button>
                                </div>
                            </div>
                        `;
                    }
                    
                    lastResultsData.push({ 
                        "Product Model": detox(model), 
                        "Target URL": url, 
                        "Optimized Title": titleClean, 
                        "Meta Description": descClean, 
                        "GEO Features": featuresClean,
                        "Expert FAQ": faqClean,
                        "Tags": detox(tags), 
                        "Category": detox(cat) 
                    });
                    
                    card.innerHTML = `
                        <div class="bg-slate-50 border-b border-slate-200 px-8 py-5 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl bg-[#005bac]/10 text-[#005bac] flex items-center justify-center text-lg"><i class="fas fa-microchip"></i></div>
                                <div><h4 class="font-black text-slate-800 text-base">${detox(model) || 'IPC MODEL'} (v1.12.17)</h4><p class="text-xs text-slate-500 truncate max-w-md mt-1">${url}</p></div>
                            </div>
                            <button onclick="window.copyToClip(this, 'all')" data-content="${encodeURIComponent(titleClean + '\n' + descClean + '\n\n' + featuresTextToCopy + '\n\n' + faqClean)}" class="text-xs bg-white border border-slate-300 px-5 py-2.5 rounded-lg font-bold shadow-sm transition-all hover:-translate-y-0.5 hover:shadow flex items-center gap-2"><i class="far fa-copy"></i> ${t.copyAll || '複製全部'}</button>
                        </div>
                        <div class="p-8 md:p-10 space-y-8">
                            
                            <div class="relative group">
                                <div class="flex justify-between items-end mb-3">
                                    <span class="text-[11px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 shadow-sm">${isZh ? 'Meta Title (意圖與權威鎖定)' : 'Meta Title (Locked Intent)'}</span>
                                    <span class="text-[11px] font-black ${titleByteLen > 60 ? 'text-red-500 bg-red-50 border-red-200' : 'text-slate-500 bg-slate-100 border-slate-200'} px-3 py-1.5 rounded-lg border">${titleByteLen} / 60 Bytes</span>
                                </div>
                                <div class="p-6 bg-white border ${titleByteLen > 60 ? 'border-red-300' : 'border-slate-200'} rounded-xl relative shadow-sm group-hover:border-blue-400 transition-colors">
                                    <p class="text-xl font-black text-slate-800">${titleClean}</p>
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(titleClean)}" class="absolute top-4 right-4 text-slate-400 hover:text-blue-600 opacity-0 group-hover:opacity-100 transition-all bg-slate-50 p-2.5 rounded-lg border border-slate-200 shadow-sm"><i class="far fa-copy text-base"></i></button>
                                </div>
                            </div>
                            
                            <div class="relative group mt-6">
                                <div class="flex justify-between items-end mb-3">
                                    <span class="text-[11px] font-black text-emerald-600 uppercase tracking-widest bg-emerald-50 px-4 py-2 rounded-lg border border-emerald-100 shadow-sm">${isZh ? 'Meta Description (CTA 注入)' : 'Meta Description (CTA)'}</span>
                                    <span class="text-[11px] font-black ${descByteLen > 150 ? 'text-red-500 bg-red-50 border-red-200' : 'text-slate-500 bg-slate-100 border-slate-200'} px-3 py-1.5 rounded-lg border">${descByteLen} / 150 Bytes</span>
                                </div>
                                <div class="p-6 bg-white border ${descByteLen > 150 ? 'border-red-300' : 'border-slate-200'} rounded-xl relative shadow-sm group-hover:border-emerald-400 transition-colors">
                                    <p class="text-sm text-slate-700 leading-relaxed font-medium">${descClean}</p>
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(descClean)}" class="absolute top-4 right-4 text-slate-400 hover:text-emerald-600 opacity-0 group-hover:opacity-100 transition-all bg-slate-50 p-2.5 rounded-lg border border-slate-200 shadow-sm"><i class="far fa-copy text-base"></i></button>
                                </div>
                            </div>
                            
                            ${specHtmlBlock}
                            
                            <div class="relative group border-t border-slate-100 pt-8">
                                <div class="flex justify-between items-end mb-3">
                                    <span class="text-[11px] font-black text-indigo-600 uppercase tracking-widest bg-indigo-50 px-4 py-2 rounded-lg border border-indigo-100 shadow-sm">${isZh ? 'Expert FAQ (語義對比推理)' : 'Expert FAQ'}</span>
                                </div>
                                <div class="p-6 bg-slate-50 border border-slate-200 rounded-xl relative shadow-inner group-hover:border-indigo-300 transition-colors">
                                    <p class="text-sm whitespace-pre-wrap leading-relaxed text-slate-700 font-medium">${faqClean}</p>
                                    <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent(faqClean)}" class="absolute top-4 right-4 text-slate-400 hover:text-indigo-600 opacity-0 group-hover:opacity-100 transition-all bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm"><i class="far fa-copy text-base"></i></button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 border-t border-slate-200 px-8 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div class="text-[12px] text-slate-500 font-medium space-y-1">
                                <p><span class="font-bold text-slate-700">${t.tagLabel || 'Tags:'}</span> <span class="text-slate-600">${detox(tags)}</span></p>
                                <p><span class="font-bold text-slate-700">${t.catLabel || 'Cat:'}</span> <span class="text-slate-600">${detox(cat)}</span></p>
                            </div>
                            <button onclick="window.copyToClip(this)" data-content="${encodeURIComponent((t.tagLabel || 'Tags:') + ' ' + detox(tags) + '\n' + (t.catLabel || 'Cat:') + ' ' + detox(cat))}" class="text-xs font-bold text-slate-600 hover:text-blue-600 transition-colors flex items-center gap-2 bg-white px-4 py-2.5 rounded-lg border border-slate-200 shadow-sm"><i class="far fa-copy"></i> ${t.copyMeta || '複製標籤'}</button>
                        </div>`;
                }
                container.appendChild(card);
            });
            if (lastResultsData.length > 0) {
                const exportBtn = document.getElementById('export-btn-container');
                if(exportBtn) exportBtn.classList.remove('hidden');
            }
        }

        window.onload = () => { updateUILanguage(); initializeCloud(); document.getElementById('file-input').addEventListener('change', updateFileDisplay); };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #334155; scroll-behavior: smooth; }
        .input-focus:focus { border-color: #005bac; box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.1); outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">
    <!-- Custom Toast Notification -->
    <div id="custom-toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[200] px-6 py-3 rounded-full shadow-xl font-bold text-sm transition-all duration-300 opacity-0 -translate-y-full pointer-events-none"></div>

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50 shadow-sm">

                <div>
                    <h1 class="text-xl font-bold text-slate-800 leading-tight" data-i18n="navTitle">GEO 內容生成系統</h1>
                    <p class="text-xs text-slate-500 font-medium tracking-wide mt-0.5" data-i18n="navVer">v1.12.17 語境對齊版</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.toggleApiModal()" class="bg-white hover:bg-slate-50 text-slate-600 font-semibold text-xs px-4 py-2 rounded-md border border-slate-200 shadow-sm flex items-center gap-2 transition-all active:scale-95">
                    <i class="fas fa-key text-yellow-500"></i> <span data-i18n="btnApiKey">設定金鑰</span>
                </button>
                <button onclick="window.toggleLanguage()" class="bg-white hover:bg-slate-50 text-slate-600 font-semibold text-xs px-4 py-2 rounded-md border border-slate-200 shadow-sm flex items-center gap-2 transition-all active:scale-95">
                    <i class="fas fa-globe"></i> 中 / EN
                </button>
                <div id="auth-status" class="text-xs font-semibold text-slate-500 bg-slate-100 border border-slate-200 px-4 py-2 rounded-full flex items-center shadow-inner transition-colors duration-500">
                    <i class="fas fa-circle-notch fa-spin mr-2"></i> Connecting...
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 sm:p-8 space-y-8">
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-3">
                    <span class="bg-blue-100 text-blue-700 w-7 h-7 rounded-md flex items-center justify-center text-sm">1</span>
                    <span data-i18n="sec1Title">目標優化產品</span>
                </h2>
                <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">

                    <select id="current-level" class="bg-transparent border-none text-sm font-bold text-[#005bac] outline-none cursor-pointer p-0 pr-4">

                        <option value="Category">產品線頁面 (PLP)</option>
                        <option value="Home">企業首頁 (Home)</option>

            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Target URLs</label>

                <div class="flex flex-col">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Source Files</label>
                    <div class="flex-grow border-2 border-dashed border-slate-300 rounded-lg p-6 flex flex-col items-center justify-center bg-slate-50 hover:bg-slate-100 hover:border-blue-400 transition-colors relative cursor-pointer group">
                        <i class="fas fa-file-upload text-3xl text-slate-400 mb-3 group-hover:text-blue-500"></i>
                        <span class="text-sm font-semibold text-slate-600" data-i18n="pdfTitle">拖放「關聯文件」(支援 PDF, DOCX, XLSX, 圖檔, TXT)</span>

            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                </div>
                <div>
                    <div class="flex justify-between items-end mb-2">

                            <button onclick="window.openUnlockModal()" id="unlock-btn" class="ml-auto text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-500 px-2.5 py-1 rounded transition-colors"><i class="fas fa-lock"></i> <span data-i18n="unlockBtn">解鎖編輯</span></button>
                        </label>

                    <div class="flex justify-end mt-1">

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8 flex flex-col md:flex-row items-center justify-between gap-6">

            <div class="space-y-4">
                <input type="password" id="api-key-input" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono text-slate-700 focus:border-[#005bac] focus:bg-white outline-none transition-colors">
                <button onclick="window.saveApiKey()" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3.5 rounded-lg shadow-sm transition-all active:scale-95 flex justify-center items-center gap-2">
                    <i class="fas fa-save"></i> <span data-i18n="modalApiSave">儲存並啟用金鑰</span>
                </button>
            </div>
            <div class="mt-4 text-center h-4">
                <span id="api-save-status" class="text-xs font-bold text-emerald-500 opacity-0 transition-opacity flex items-center justify-center gap-1">
                    <i class="fas fa-check-circle"></i> <span data-i18n="modalApiSuccess">金鑰已成功儲存！</span>
                </span>
            </div>
        </div>
    </div>

    <!-- 自定義密碼解鎖彈窗 -->
    <div id="unlock-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center transition-opacity opacity-0">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-transform scale-95" id="unlock-modal-content">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-lock text-[#005bac]"></i> <span data-i18n="unlockBtn">管理員解鎖</span></h3>
                <button onclick="window.closeUnlockModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <p id="unlock-prompt-text" class="text-xs text-slate-500 mb-6 font-medium leading-relaxed">請輸入管理員密碼解鎖品牌規範：</p>
            <input type="password" id="unlock-pwd-input" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:border-[#005bac] focus:bg-white outline-none transition-colors mb-2 font-mono" onkeydown="if(event.key === 'Enter') window.submitUnlock()">
            <p id="unlock-error-msg" class="text-xs text-red-500 font-bold hidden mb-4"><i class="fas fa-exclamation-circle"></i> <span id="unlock-error-text">密碼錯誤，拒絕解鎖。</span></p>
            <button onclick="window.submitUnlock()" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3.5 mt-2 rounded-lg shadow-sm transition-all active:scale-95 flex justify-center items-center gap-2">
                <i class="fas fa-key"></i> 確認解鎖
            </button>
        </div>
    </div>

    <!-- 自定義清除資料警告彈窗 -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center transition-opacity opacity-0">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-transform scale-95" id="confirm-modal-content">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600"><i class="fas fa-exclamation-triangle"></i></div>
                <h3 class="text-lg font-bold text-slate-800">警告</h3>
            </div>
            <p id="confirm-reset-text" class="text-sm text-slate-600 mb-8 font-medium leading-relaxed">確定要清除知識庫嗎？清除後雲端資料將同步清空。</p>
            <div class="flex gap-3 justify-end">
                <button onclick="window.closeConfirmModal()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg text-sm transition-colors">取消</button>
                <button onclick="window.executeReset()" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg text-sm shadow-sm transition-colors flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i> 確定清除
                </button>
            </div>
        </div>
    </div>
</body>
</html>
